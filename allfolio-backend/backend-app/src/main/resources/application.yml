spring:
  application:
    name: allfolio-backend
  main:
    web-application-type: servlet   # webflux 의존성 추가 시 servlet 타입 명시

  datasource:
    url: jdbc:postgresql://localhost:5432/allfolio?reWriteBatchedInserts=true&prepareThreshold=5
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 300ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2


  hikari:
      # 커넥션 풀 크기: vCPU × 2 + effective_spindle_count (SSD 기준 = vCPU × 2)
      # 기본 운영 환경 8 vCPU 기준 → pool-size 16~20
      maximum-pool-size: 20
      minimum-idle: 10

      # 커넥션 획득 대기 최대 시간 (부하 테스트 시 timeout 방지)
      connection-timeout: 5000        # 5초

      # 유휴 커넥션 해제 시간
      idle-timeout: 300000            # 5분

      # 커넥션 최대 수명 (PostgreSQL wait_timeout보다 짧게)
      max-lifetime: 1800000           # 30분

      # 커넥션 유효성 검사 주기
      keepalive-time: 30000           # 30초

      pool-name: allfolio-pool
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false               # OSIV 비활성화 — 커넥션 조기 반환
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

        # Batch INSERT 전략 (trade_raw, position_daily 대량 저장)
        jdbc:
          batch_size: 500
          batch_versioned_data: true
        order_inserts: true           # batch INSERT 시 같은 테이블 묶기
        order_updates: true

        # 2차 캐시 비활성화 (멀티테넌트 환경에서 캐시 오염 방지)
        cache:
          use_second_level_cache: false
          use_query_cache: false

        # 통계 (부하 테스트 시 활성화하여 slow query 추적)
        generate_statistics: false

server:
  port: 8090
  tomcat:
    # Virtual Thread 환경에서는 증가 가능 (Java 21)
    threads:
      max: 200
      min-spare: 20
    accept-count: 100
    connection-timeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,hikaricp,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: allfolio-backend

binance:
  api-key: ${BINANCE_API_KEY:}
  secret-key: ${BINANCE_API_SECRET:}
  base-url: https://testnet.binance.vision   # testnet — 실제 운영 시 https://api.binance.com
  tenant-id: ${BINANCE_TENANT_ID:ffff0000-0000-0000-0000-000000000001}
  portfolio-id: ${BINANCE_PORTFOLIO_ID:dddd0000-0000-0000-0000-000000000001}
  symbols: BTCUSDT,ETHUSDT

toss:
  client-id: ${TOSS_CLIENT_ID:}
  client-secret: ${TOSS_CLIENT_SECRET:}
  base-url: https://openapi.toss.im
  redirect-uri: ${TOSS_REDIRECT_URI:http://localhost:8090/api/broker/toss/callback}

samsung:
  app-key: ${SAMSUNG_APP_KEY:}
  app-secret: ${SAMSUNG_APP_SECRET:}
  base-url: https://openapi.samsungpop.com
  redirect-uri: ${SAMSUNG_REDIRECT_URI:http://localhost:8090/api/broker/samsung/callback}

# Kafka (optional — 설정 없으면 Redis DLQ + DB Outbox만 사용)
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all                # 모든 ISR 복제 완료 후 ack — 메시지 유실 방지
      retries: 3
      properties:
        enable.idempotence: true       # Producer 멱등성: exactly-once 쓰기 (acks=all 필요)
        max.in.flight.requests.per.connection: 5  # idempotence 허용 최대값
        linger.ms: 5                   # micro-batching 5ms
        batch.size: 16384
        delivery.timeout.ms: 30000    # 총 재시도 포함 최대 30s
    consumer:
      group-id: allfolio-dlq
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false        # 수동 ack — 재처리 정확성 보장
      max-poll-records: 50             # 한 번에 처리할 최대 레코드 수

# Binance WebSocket (binance 설정 있을 때 자동 활성화)
binance:
  ws-enabled: ${BINANCE_WS_ENABLED:false}  # WebSocket 시세 수신 활성화 여부

# FX 환율 자동 수집
fx:
  scheduler:
    enabled: ${FX_SCHEDULER_ENABLED:false}   # true 시 BinanceFxApiClient + FxRateScheduler 활성화
    delay-ms: 60000                          # 갱신 주기 (ms)
  usdt-krw:
    fallback-rate: ${FX_USDT_KRW_FALLBACK:1350}  # Redis miss 시 사용할 fallback 환율

logging:
  level:
    root: INFO
    com.allfolio: INFO
    org.hibernate.SQL: OFF
    com.zaxxer.hikari: INFO

---
# 부하 테스트 프로파일
spring:
  config:
    activate:
      on-profile: load-test
  jpa:
    properties:
      hibernate:
        generate_statistics: true   # 부하 테스트 시 쿼리 통계 활성화
logging:
  level:
    com.zaxxer.hikari: DEBUG        # 커넥션 풀 상태 추적
    org.hibernate.stat: DEBUG       # Hibernate 통계
