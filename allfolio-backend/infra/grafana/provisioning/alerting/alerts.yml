apiVersion: 1

groups:
  - orgId: 1
    name: allfolio-alerts
    folder: Allfolio
    interval: 1m
    rules:

      # ── CRITICAL ───────────────────────────────────────────────
      - uid: outbox-dead-critical
        title: "[CRITICAL] Outbox DEAD 이벤트 발생"
        condition: C
        data:
          - refId: A
            queryType: ''
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "outbox_dead_size > 0"
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: C
            queryType: ''
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator:  { type: and }
                  query:     { params: [A] }
                  reducer:   { params: [], type: last }
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "MAX_RETRIES 초과 이벤트 발생 — 수동 확인 필요"
          description: "outbox_dead_size = {{ $values.A }}"
        labels:
          severity: critical

      # ── WARNING ────────────────────────────────────────────────
      - uid: outbox-pending-warn
        title: "[WARN] Outbox PENDING 이벤트 1000건 초과"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "outbox_pending_size"
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [1000], type: gt }
                  query:     { params: [A] }
                  reducer:   { type: last }
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning

      - uid: kafka-publish-fail-warn
        title: "[WARN] Kafka Publish 실패율 5% 초과"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(kafka_publish_count_total{result='fail',topic='outbox.trade'}[5m]) / (rate(kafka_publish_count_total{topic='outbox.trade'}[5m]) + 1e-9)"
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [0.05], type: gt }
                  query:     { params: [A] }
                  reducer:   { type: last }
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning

      - uid: snapshot-latency-warn
        title: "[WARN] Snapshot 생성 레이턴시 p95 > 1s"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "histogram_quantile(0.95, rate(snapshot_process_latency_seconds_bucket[5m]))"
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [1.0], type: gt }
                  query:     { params: [A] }
                  reducer:   { type: last }
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
