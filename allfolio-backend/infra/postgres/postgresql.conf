# ============================================================
# Allfolio PostgreSQL 부하 테스트 튜닝 설정
# 기준: 8 vCPU / 16GB RAM / SSD 환경
# ============================================================

# ── 연결 ─────────────────────────────────────────────────────
listen_addresses = '*'              # 모든 인터페이스에서 수신 (Docker 컨테이너 간 통신 필수)
max_connections = 200               # HikariCP pool(20) × 인스턴스 수 + 여유

# ── 메모리 ───────────────────────────────────────────────────
shared_buffers = 4GB                # RAM의 25% — 자주 읽는 페이지 캐시
effective_cache_size = 12GB         # OS 파일 캐시 포함 추정치 (쿼리 플래너 힌트)
work_mem = 16MB                     # 정렬/해시 조인당 메모리
                                    # 주의: max_connections × work_mem = 최대 3.2GB
maintenance_work_mem = 512MB        # VACUUM, CREATE INDEX 용
wal_buffers = 64MB                  # WAL 쓰기 버퍼 (INSERT 집중 환경)

# ── WAL / 내구성 (부하 테스트 최적화) ──────────────────────
wal_level = replica
synchronous_commit = off            # ★ 부하 테스트 시 비동기 커밋 (성능↑, 전원 장애 시 최대 wal_writer_delay 손실)
wal_writer_delay = 200ms
checkpoint_completion_target = 0.9  # 체크포인트를 분산하여 I/O 스파이크 완화
max_wal_size = 4GB                  # 체크포인트 빈도 감소 → INSERT 성능 향상
min_wal_size = 1GB

# ── 병렬 쿼리 ────────────────────────────────────────────────
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ── 쿼리 플래너 ──────────────────────────────────────────────
random_page_cost = 1.1              # SSD 환경 (HDD 기본값 4.0보다 낮게)
effective_io_concurrency = 200      # SSD 비동기 I/O 동시성

# ── 자동 VACUUM 튜닝 ─────────────────────────────────────────
# INSERT ONLY 테이블은 dead tuple이 거의 없으나 통계 갱신 필요
autovacuum_vacuum_scale_factor = 0.01   # 1%만 변경돼도 VACUUM
autovacuum_analyze_scale_factor = 0.005 # 0.5%만 변경돼도 ANALYZE
autovacuum_vacuum_cost_delay = 2ms      # VACUUM I/O 속도 높이기

# ── 로깅 (부하 테스트 모니터링) ─────────────────────────────
log_min_duration_statement = 100    # 100ms 이상 쿼리 로깅 (slow query 추적)
log_checkpoints = on
log_connections = off               # 부하 테스트 시 연결 로그 끄기
log_lock_waits = on
deadlock_timeout = 500ms
