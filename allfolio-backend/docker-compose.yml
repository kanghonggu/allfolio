services:
  postgres:
    image: postgres:16-alpine
    container_name: allfolio-postgres
    environment:
      POSTGRES_DB: allfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: allfolio-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  allfolio-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allfolio-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/allfolio?reWriteBatchedInserts=true&prepareThreshold=5
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      BINANCE_TENANT_ID: ffff0000-0000-0000-0000-000000000001
      BINANCE_PORTFOLIO_ID: dddd0000-0000-0000-0000-000000000001
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
    driver: local
