version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: allfolio-postgres
    environment:
      POSTGRES_DB: allfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  allfolio-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allfolio-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/allfolio?reWriteBatchedInserts=true&prepareThreshold=5
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JAVA_OPTS: >-
        -server
        -Xms512m
        -Xmx2g
        -XX:+UseZGC
        -XX:MaxGCPauseMillis=50
        -XX:+UseStringDeduplication
        -Dspring.profiles.active=prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
